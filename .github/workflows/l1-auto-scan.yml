name: L1 Auto-Scan Trigger

on:
  schedule:
    # Every 45 min, 8:00 AM–9:30 PM IST (UTC+5:30), Mon–Fri.
    # 19 exact trigger times — no runtime filtering needed.
    - cron: '30 2,5,8,11,14 * * 1-5'   # 08:00 11:00 14:00 17:00 20:00 IST
    - cron: '15 3,6,9,12,15 * * 1-5'   # 08:45 11:45 14:45 17:45 20:45 IST
    - cron: '0 4,7,10,13,16 * * 1-5'   # 09:30 12:30 15:30 18:30 21:30 IST
    - cron: '45 4,7,10,13 * * 1-5'     # 10:15 13:15 16:15 19:15 IST
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Run L1 scan and post summary
        run: npm run trigger
        env:
          SLACK_USER_TOKEN: ${{ secrets.SLACK_USER_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_L1_USERGROUP_ID: ${{ secrets.SLACK_L1_USERGROUP_ID }}
          SLACK_CANVAS_ID: ${{ secrets.SLACK_CANVAS_ID }}
